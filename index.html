<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Digital Namecard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#000000; --card:#111111; --border:#1e1e1e;
      --green:#39ff14; --purple:#9b30ff; --purple2:#c77dff;
      --white:#f0f0f0; --gray:#888888;
    }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Outfit',sans-serif; background:var(--black); color:var(--white); }
    .glow-green { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(57,255,20,.10) 0%,transparent 70%); top:-120px; left:-120px; pointer-events:none; z-index:0; }
    .glow-purple { position:fixed; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(155,48,255,.09) 0%,transparent 70%); bottom:-160px; right:-160px; pointer-events:none; z-index:0; }
    .pages { position:relative; z-index:1; display:flex; width:100%; height:100%; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .pages::-webkit-scrollbar { display:none; }
    .page { flex:0 0 100%; width:100%; height:100%; scroll-snap-align:start; overflow-y:auto; scrollbar-width:none; display:flex; flex-direction:column; align-items:center; }
    .page::-webkit-scrollbar { display:none; }
    .page-inner { width:100%; max-width:480px; padding:0 20px 50px; display:flex; flex-direction:column; gap:22px; }
    .page-dots { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:100; }
    .dot { width:6px; height:6px; border-radius:3px; background:var(--border); transition:all .3s; cursor:pointer; }
    .dot.active { width:22px; background:var(--green); box-shadow:0 0 8px var(--green); }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding-top:44px; }
    .logo-tag { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--green); border:1px solid var(--green); padding:4px 12px; border-radius:20px; box-shadow:0 0 10px rgba(57,255,20,.25); }
    .nfc-badge { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--gray); letter-spacing:.1em; }
    .nfc-badge svg { width:16px; height:16px; fill:var(--purple); }
    .company-block { display:flex; align-items:center; justify-content:center; background:var(--card); border:1px solid var(--border); border-radius:20px; overflow:hidden; position:relative; padding:0; }
    .company-block::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--green),var(--purple)); z-index:1; }
    .company-logo-only { width:100%; height:156px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .company-logo-only img { width:100%; height:100%; object-fit:cover; }
    .company-logo-placeholder { display:flex; align-items:center; justify-content:center; }
    .company-logo-placeholder svg { width:36px; height:36px; fill:#2a2a2a; }
    .profile-hero { background:var(--card); border:1px solid var(--border); border-radius:28px; overflow:hidden; }
    .hero-card-inner { display:flex; align-items:stretch; width:100%; min-height:160px; }
    .hero-photo-wrap { width:42%; flex-shrink:0; position:relative; overflow:hidden; background:#151515; }
    .hero-photo-wrap .placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#151515; }
    .hero-photo-wrap .placeholder svg { width:44px; height:44px; fill:#333; }
    .hero-info-wrap { flex:1; padding:22px 18px; display:flex; flex-direction:column; justify-content:space-between; gap:6px; }
    .hero-info-wrap .person-name { font-size:26px; font-weight:900; letter-spacing:-.02em; color:#fff; line-height:1.15; }
    .hero-info-wrap .person-title { font-size:12px; color:var(--gray); font-weight:300; letter-spacing:.03em; }
    .hero-company-row { display:flex; align-items:center; justify-content:center; margin-top:auto; padding-top:12px; border-top:1px solid #1e1e1e; }
    .hero-company-text { font-size:16px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; background:linear-gradient(90deg,var(--green),var(--purple2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; width:100%; text-align:center; white-space:nowrap; }
    .remember-btn { display:flex; align-items:center; justify-content:space-between; background:linear-gradient(135deg,rgba(155,48,255,.15),rgba(57,255,20,.07)); border:1px solid rgba(155,48,255,.45); border-radius:20px; padding:20px 22px; text-decoration:none; transition:all .25s; position:relative; overflow:hidden; }
    .remember-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(155,48,255,.08),rgba(57,255,20,.04)); opacity:0; transition:opacity .25s; }
    .remember-btn:hover::before { opacity:1; }
    .remember-btn:hover { border-color:rgba(155,48,255,.7); box-shadow:0 0 30px rgba(155,48,255,.2); }
    .r-left { display:flex; align-items:center; gap:14px; }
    .r-icon { width:48px; height:48px; border-radius:14px; background:linear-gradient(135deg,var(--purple),#6a0dad); display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px rgba(155,48,255,.35); flex-shrink:0; }
    .r-icon svg { width:22px; height:22px; fill:#fff; }
    .r-text .rtag { font-size:10px; color:var(--purple2); letter-spacing:.15em; text-transform:uppercase; margin-bottom:3px; }
    .r-text .rtitle { font-size:15px; font-weight:600; }
    .r-text .rsub { font-size:11px; color:var(--gray); margin-top:2px; }
    .r-arrow { width:34px; height:34px; border-radius:50%; border:1px solid rgba(155,48,255,.4); display:flex; align-items:center; justify-content:center; color:var(--purple2); font-size:18px; flex-shrink:0; transition:transform .2s; }
    .remember-btn:hover .r-arrow { transform:translateX(3px); }
    .swipe-hint { display:flex; align-items:center; justify-content:center; gap:8px; color:#ccc; font-size:14px; letter-spacing:.1em; padding-bottom:10px; }
    .swipe-hint svg { width:16px; height:16px; fill:#ccc; }
    .lang-btn { font-family:'Outfit',sans-serif; font-size:11px; letter-spacing:.1em; padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--gray); cursor:pointer; transition:all .2s; }
    .lang-btn.active { border-color:var(--green); color:var(--green); box-shadow:0 0 10px rgba(57,255,20,.2); }
    .flip-label { display:flex; align-items:center; justify-content:space-between; }
    .flip-tip { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--purple2); }
    .flip-tip svg { width:13px; height:13px; fill:var(--purple2); }
    .card-3d-wrap { perspective:1200px; width:100%; aspect-ratio:9/5; cursor:pointer; }
    .card-3d-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .7s cubic-bezier(.4,0,.2,1); border-radius:18px; }
    .card-3d-wrap.flipped .card-3d-inner { transform:rotateY(180deg); }
    .card-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:18px; overflow:hidden; border:1px solid var(--border); }
    .card-face img { width:100%; height:100%; object-fit:cover; display:block; }
    .card-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; background:linear-gradient(135deg,#111,#1a1a1a); color:var(--gray); font-size:13px; text-align:center; }
    .card-placeholder svg { width:30px; height:30px; fill:#2a2a2a; }
    .card-back { transform:rotateY(180deg); }
    .dl-btn { display:flex; align-items:center; gap:6px; background:transparent; border:1px solid var(--border); border-radius:10px; padding:5px 12px; font-family:'Outfit',sans-serif; font-size:11px; color:var(--gray); cursor:pointer; text-decoration:none; transition:all .2s; flex-shrink:0; }
    .dl-btn:hover { border-color:var(--green); color:var(--green); }
    .dl-btn svg { width:13px; height:13px; fill:currentColor; }
    .info-card { background:var(--card); border:1px solid var(--border); border-radius:22px; overflow:hidden; }
    .info-row { display:flex; align-items:center; gap:16px; padding:15px 20px; border-bottom:1px solid var(--border); text-decoration:none; transition:background .2s; }
    .info-row:last-child { border-bottom:none; }
    .info-row:hover { background:rgba(255,255,255,.025); }
    .info-icon { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .info-icon svg { width:17px; height:17px; }
    .info-icon.g { background:rgba(57,255,20,.1); }
    .info-icon.g svg { fill:var(--green); }
    .info-icon.p { background:rgba(155,48,255,.1); }
    .info-icon.p svg { fill:var(--purple2); }
    .info-text .lbl { font-size:10px; color:var(--gray); letter-spacing:.12em; text-transform:uppercase; margin-bottom:2px; }
    .info-text .val { font-size:14px; color:var(--white); }
    .info-arrow { color:#2a2a2a; font-size:18px; margin-left:auto; flex-shrink:0; }
    .save-contact-btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:linear-gradient(135deg,rgba(57,255,20,.15),rgba(57,255,20,.05)); border:1px solid rgba(57,255,20,.4); border-radius:16px; padding:16px; font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; color:var(--green); cursor:pointer; transition:all .25s; }
    .save-contact-btn:hover { background:linear-gradient(135deg,rgba(57,255,20,.25),rgba(57,255,20,.1)); box-shadow:0 0 20px rgba(57,255,20,.2); }
    .save-contact-btn svg { width:18px; height:18px; fill:var(--green); }
    .fade-up { opacity:0; transform:translateY(16px); animation:fadeup .45s ease forwards; }
    @keyframes fadeup { to { opacity:1; transform:translateY(0); } }
    .d1{animation-delay:.04s} .d2{animation-delay:.12s} .d3{animation-delay:.20s}
    .d4{animation-delay:.28s} .d5{animation-delay:.36s} .d6{animation-delay:.44s}
  </style>
</head>
<body>
<div class="glow-green"></div>
<div class="glow-purple"></div>
<div class="pages" id="pages">
  <!-- PAGE 1 -->
  <div class="page" id="page1">
    <div class="page-inner">
      <div class="topbar fade-up d1">
        <span class="logo-tag">Digital Namecard</span>
        <span class="nfc-badge">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-5 14.5h-2V12l-3 2.5v-2.5l3-2.5V8h2v8.5z"/></svg>
          NFC
        </span>
      </div>
      <div class="company-block fade-up d2">
        <div class="company-logo-only">
          <div class="company-logo-placeholder" id="logo-placeholder">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <img id="logo-img" style="display:none;width:100%;height:100%;object-fit:cover;" />
        </div>
      </div>
      <div class="profile-hero fade-up d3">
        <div class="hero-card-inner">
          <div class="hero-photo-wrap">
            <div class="placeholder" id="profile-placeholder">
              <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            </div>
            <img id="profile-img" style="display:none;width:100%;height:100%;object-fit:cover;" />
          </div>
          <div class="hero-info-wrap">
            <div class="person-name" id="p1-name">하형석</div>
            <div class="person-title" id="p1-title">이사 / CEO Staff</div>
            <div class="hero-company-row">
              <div class="hero-company-text" id="hero-company-text">Galaxy Corporation</div>
            </div>
          </div>
        </div>
      </div>
      <a class="remember-btn fade-up d4" id="remember-btn" href="#" target="_blank" rel="noopener">
        <div class="r-left">
          <div class="r-icon">
            <svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
          </div>
          <div class="r-text">
            <div class="rtag">Remember App</div>
            <div class="rtitle" id="remember-title">명함 저장하기</div>
            <div class="rsub" id="remember-sub">Remember에서 바로 저장</div>
          </div>
        </div>
        <div class="r-arrow">›</div>
      </a>
      <div class="swipe-hint fade-up d5">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        Swipe for contact info
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
      </div>
    </div>
  </div>
  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <div class="page-inner">
      <div style="padding-top:44px;width:100%;display:flex;align-items:center;gap:8px;flex-wrap:nowrap;">
        <span class="logo-tag" style="font-size:10px;white-space:nowrap;flex-shrink:0;">Business Card</span>
        <div style="display:flex;gap:6px;flex-shrink:0;margin-left:auto;">
          <button class="lang-btn active" style="font-size:10px;padding:4px 10px;white-space:nowrap;" id="btn-ko">한국어</button>
          <button class="lang-btn" style="font-size:10px;padding:4px 10px;white-space:nowrap;" id="btn-en">English</button>
          <button class="lang-btn" style="font-size:10px;padding:4px 10px;white-space:nowrap;" id="btn-ja">日本語</button>
        </div>
      </div>
      <div class="flip-label">
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="dl-btn" onclick="saveCurrentFace()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            <span id="btn-save">저장</span>
          </button>
          <span class="flip-tip">
            <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.3 0 6 2.7 6 6 0 1-.3 2-.7 2.8l1.5 1.5C19.5 15 20 13.6 20 12c0-4.4-3.6-8-8-8zm0 14c-3.3 0-6-2.7-6-6 0-1 .3-2 .7-2.8L5.2 7.7C4.5 9 4 10.5 4 12c0 4.4 3.6 8 8 8v3l4-4-4-4v3z"/></svg>
            <span id="btn-flip">탭해서 뒤집기</span>
          </span>
        </div>
      </div>
      <div class="card-3d-wrap" id="cardFlip" onclick="this.classList.toggle('flipped')">
        <div class="card-3d-inner">
          <div class="card-face card-front">
            <div class="card-placeholder" id="card-front-placeholder">
              <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
              <span id="card-front-label">명함 앞면</span>
            </div>
            <img id="card-front-img" style="display:none;width:100%;height:100%;object-fit:cover;" />
          </div>
          <div class="card-face card-back">
            <div class="card-placeholder" id="card-back-placeholder">
              <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
              <span id="card-back-label">명함 뒷면</span>
            </div>
            <img id="card-back-img" style="display:none;width:100%;height:100%;object-fit:cover;" />
          </div>
        </div>
      </div>
      <div class="info-card">
        <div class="info-row">
          <span class="info-icon p"><svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg></span>
          <div class="info-text">
            <div class="lbl" id="lbl-company">회사</div>
            <div class="val" id="p2-company">갤럭시코퍼레이션</div>
          </div>
        </div>
        <div class="info-row">
          <span class="info-icon g"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></span>
          <div class="info-text">
            <div class="lbl" id="lbl-name">이름</div>
            <div class="val" id="p2-name">하형석</div>
          </div>
        </div>
        <div class="info-row">
          <span class="info-icon p"><svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.34C18 2.54 15.5 0 12.34 0S6.67 2.54 6.67 4.66c0 .46.1.9.18 1.34H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7.66-4c1.28 0 2.34 1.07 2.34 2.34 0 .28-.1.56-.2.82L12 6.5l-2.48-1.34c-.1-.26-.2-.54-.2-.82C9.33 3.07 10.4 2 11.66 2h.68zM12 9c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm4 10H8v-1.56C8 15.65 11.86 15 12 15s4 .65 4 2.44V19z"/></svg></span>
          <div class="info-text">
            <div class="lbl" id="lbl-title">직급</div>
            <div class="val" id="p2-title">이사 / CEO Staff</div>
          </div>
        </div>
        <div class="info-row">
          <span class="info-icon g"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></span>
          <div class="info-text">
            <div class="lbl" id="lbl-dept">부서</div>
            <div class="val" id="p2-dept">CVC / M&amp;A</div>
          </div>
        </div>
        <a class="info-row" id="email-row" href="mailto:justin.ha@galaxyuniverse.ai">
          <span class="info-icon p"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></span>
          <div class="info-text">
            <div class="lbl" id="lbl-email">이메일</div>
            <div class="val" id="p2-email">justin.ha@galaxyuniverse.ai</div>
          </div>
          <span class="info-arrow">›</span>
        </a>
        <a class="info-row" id="phone-row" href="tel:+82-010-7727-3028">
          <span class="info-icon g"><svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg></span>
          <div class="info-text">
            <div class="lbl" id="lbl-phone">휴대폰</div>
            <div class="val" id="p2-phone">+82-010-7727-3028</div>
          </div>
          <span class="info-arrow">›</span>
        </a>
        <div class="info-row">
          <span class="info-icon p"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></span>
          <div class="info-text">
            <div class="lbl" id="lbl-address">주소</div>
            <div class="val" id="p2-address">서울 영등포구 국제금융로 10 Three IFC 53F</div>
          </div>
        </div>
      </div>
      <button class="save-contact-btn" onclick="saveContact()">
        <svg viewBox="0 0 24 24"><path d="M20 0H4C2.9 0 2 .9 2 2v20l4-4h14c1.1 0 2-.9 2-2V2c0-1.1-.9-2-2-2zm-5 9h-2v2h2v2h-2v2h-2v-2H9v-2h2V9H9V7h2V5h2v2h2v2z"/></svg>
        <span id="btn-save-contact">연락처 저장</span>
      </button>
    </div>
  </div>
</div>
<div class="page-dots">
  <div class="dot active" onclick="goPage(0)"></div>
  <div class="dot" onclick="goPage(1)"></div>
</div>
<a href="admin.html" id="edit-fab" style="position:fixed;bottom:20px;right:20px;z-index:200;width:36px;height:36px;border-radius:50%;background:#111;border:1px solid #2a2a2a;display:none;align-items:center;justify-content:center;opacity:.4;transition:opacity .2s;text-decoration:none;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.4">
  <svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:#888"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
</a>
<script data-cfasync="false">
  var pages = document.getElementById('pages');
  var dots = document.querySelectorAll('.dot');
  function goPage(i) { pages.scrollTo({ left: pages.clientWidth * i, behavior: 'smooth' }); }
  pages.addEventListener('scroll', function() {
    var idx = Math.round(pages.scrollLeft / pages.clientWidth);
    dots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
  });
  var LANG = {
    ko: {
      company:'회사', name:'이름', title:'직급', dept:'부서',
      email:'이메일', phone:'휴대폰', address:'주소',
      save:'저장', flip:'탭해서 뒤집기',
      cardFront:'명함 앞면', cardBack:'명함 뒷면',
      rememberTitle:'명함 저장하기', rememberSub:'Remember에서 바로 저장',
      saveContact:'연락처 저장'
    },
    en: {
      company:'Company', name:'Name', title:'Title', dept:'Department',
      email:'Email', phone:'Mobile', address:'Address',
      save:'Save', flip:'Tap to flip',
      cardFront:'Card Front', cardBack:'Card Back',
      rememberTitle:'Save Contact', rememberSub:'Save directly in Remember',
      saveContact:'Save to Contacts'
    },
    ja: {
      company:'会社', name:'名前', title:'役職', dept:'部署',
      email:'メール', phone:'携帯', address:'住所',
      save:'保存', flip:'タップして裏面',
      cardFront:'名刺 表面', cardBack:'名刺 裏面',
      rememberTitle:'名刺を保存', rememberSub:'Rememberで保存する',
      saveContact:'連絡先に保存'
    }
  };
  var currentLang = 'ko';
  var cardData = {};
  function setLang(lang) {
    currentLang = lang;
    var t = LANG[lang];
    document.getElementById('lbl-company').textContent = t.company;
    document.getElementById('lbl-name').textContent = t.name;
    document.getElementById('lbl-title').textContent = t.title;
    document.getElementById('lbl-dept').textContent = t.dept;
    document.getElementById('lbl-email').textContent = t.email;
    document.getElementById('lbl-phone').textContent = t.phone;
    document.getElementById('lbl-address').textContent = t.address;
    document.getElementById('btn-save').textContent = t.save;
    document.getElementById('btn-flip').textContent = t.flip;
    document.getElementById('card-front-label').textContent = t.cardFront;
    document.getElementById('card-back-label').textContent = t.cardBack;
    document.getElementById('remember-title').textContent = t.rememberTitle;
    document.getElementById('remember-sub').textContent = t.rememberSub;
    document.getElementById('btn-save-contact').textContent = t.saveContact;
    if (cardData.company) document.getElementById('p2-company').textContent = cardData.company[lang] || cardData.company.ko;
    if (cardData.name)    document.getElementById('p2-name').textContent    = cardData.name[lang]    || cardData.name.ko;
    if (cardData.title)   document.getElementById('p2-title').textContent   = cardData.title[lang]   || cardData.title.ko;
    if (cardData.dept)    document.getElementById('p2-dept').textContent    = cardData.dept[lang]    || cardData.dept.ko;
    if (cardData.address) document.getElementById('p2-address').textContent = cardData.address[lang] || cardData.address.ko || '';
    document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ja').classList.toggle('active', lang === 'ja');
  }
  document.getElementById('btn-ko').onclick = function() { setLang('ko'); };
  document.getElementById('btn-en').onclick = function() { setLang('en'); };
  document.getElementById('btn-ja').onclick = function() { setLang('ja'); };
  function setImg(imgId, phId, src) {
    if (!src) return;
    var img = document.getElementById(imgId);
    var ph  = document.getElementById(phId);
    if (img) { img.src = src; img.style.display = 'block'; }
    if (ph)  ph.style.display = 'none';
  }
  fetch('data.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      cardData = d;
      setImg('profile-img',    'profile-placeholder',    d.profile);
      setImg('logo-img',       'logo-placeholder',       d.logo);
      setImg('card-front-img', 'card-front-placeholder', d.cardFront);
      setImg('card-back-img',  'card-back-placeholder',  d.cardBack);
      if (d.name && d.name.ko)    document.getElementById('p1-name').textContent  = d.name.ko;
      if (d.title && d.title.ko)  document.getElementById('p1-title').textContent = d.title.ko;
      if (d.company && d.company.en) document.getElementById('hero-company-text').textContent = d.company.en;
      if (d.company && d.company.ko) document.getElementById('p2-company').textContent = d.company.ko;
      if (d.name && d.name.ko)    document.getElementById('p2-name').textContent   = d.name.ko;
      if (d.title && d.title.ko)  document.getElementById('p2-title').textContent  = d.title.ko;
      if (d.dept && d.dept.ko)    document.getElementById('p2-dept').textContent   = d.dept.ko;
      if (d.address && d.address.ko) document.getElementById('p2-address').textContent = d.address.ko;
      if (d.email) {
        document.getElementById('p2-email').textContent = d.email;
        document.getElementById('email-row').href = 'mailto:' + d.email;
      }
      if (d.phone) {
        document.getElementById('p2-phone').textContent = d.phone;
        document.getElementById('phone-row').href = 'tel:' + d.phone.replace(/[^+\d]/g,'');
      }
      if (d.rememberLink) {
        document.getElementById('remember-btn').href = d.rememberLink;
      }
    })
    .catch(function(e) { console.error('data.json 로드 실패:', e); });
  function saveContact() {
    var d = cardData;
    var name = (d.name && d.name.ko) || '하형석';
    var phone = d.phone || '+82-010-7727-3028';
    var email = d.email || 'justin.ha@galaxyuniverse.ai';
    var org = (d.company && d.company.ko) || '갤럭시코퍼레이션';
    var title = (d.title && d.title.ko) || '이사 / CEO Staff';
    var addr = (d.address && d.address.en) || '';
    var vcard = 'BEGIN:VCARD\r\nVERSION:3.0\r\nFN:' + name + '\r\nORG:' + org + '\r\nTITLE:' + title + '\r\nTEL;TYPE=CELL:' + phone + '\r\nEMAIL:' + email + (addr ? '\r\nADR;TYPE=WORK:;;' + addr + ';;;;' : '') + '\r\nEND:VCARD';
    var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = name + '.vcf';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function saveCurrentFace() {
    var isFlipped = document.getElementById('cardFlip').classList.contains('flipped');
    var img = document.getElementById(isFlipped ? 'card-back-img' : 'card-front-img');
    if (img && img.style.display !== 'none' && img.src) {
      var a = document.createElement('a');
      a.href = img.src;
      a.download = isFlipped ? 'card_back.jpg' : 'card_front.jpg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
  }
</script>
</body>
</html>
